<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>SENTINEL — Create Account</title>
    <link rel="stylesheet" href="/static/fonts.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-brand">
                <span class="auth-logo-icon">◈</span>
                <span class="auth-logo-title">SENTINEL</span>
            </div>

            <div class="auth-heading">CREATE ACCOUNT</div>

            <div class="form-group">
                <label class="form-label" for="role">ROLE</label>
                <select id="role" class="edit-select" style="width:100%;padding:9px 12px;font-size:12px">
                    <option value="user">USER</option>
                    <option value="admin">ADMIN</option>
                </select>
            </div>

            <div class="form-group" id="user-link-group">
                <label class="form-label" for="user-select">PROFILE</label>
                <select id="user-select" class="edit-select" style="width:100%;padding:9px 12px;font-size:12px">
                    <option value="">— select profile —</option>
                </select>
            </div>

            <div class="form-group" id="admin-email-group" style="display:none">
                <label class="form-label" for="email">EMAIL</label>
                <input type="email" id="email" class="form-input" placeholder="admin@email.com" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">PASSWORD</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
            </div>

            <button class="add-btn" id="register-btn">
                <span class="add-btn-icon">＋</span>
                CREATE ACCOUNT
            </button>

            <div id="message" class="message"></div>

            <div class="auth-link"><a href="/">← Back to dashboard</a></div>

        </div>
    </div>

    <script type="module" src="/static/register.js"></script>
</body>
</html>
