<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>SENTINEL — Login</title>
    <link rel="stylesheet" href="/static/fonts.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-brand">
                <span class="auth-logo-icon">◈</span>
                <span class="auth-logo-title">SENTINEL</span>
            </div>

            <div class="auth-heading">LOGIN</div>

            <div class="form-group">
                <label class="form-label" for="email">EMAIL</label>
                <input type="email" id="email" class="form-input" placeholder="your@email.com" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">PASSWORD</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
            </div>

            <button class="add-btn" id="login-btn">LOGIN</button>

            <div id="message" class="message"></div>

        </div>
    </div>

    <script type="module" src="/static/login.js"></script>
</body>
</html>
