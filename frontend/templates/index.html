<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Tag Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <div class="app">

        <!-- ── TOP NAV ── -->
        <header class="topbar">
            <div class="topbar-brand">
                <span class="logo-icon">◈</span>
                <div>
                    <div class="logo-title">SENTINEL</div>
                    <div class="logo-sub">Access Control System</div>
                </div>
            </div>
            <nav class="topbar-nav">
                <span class="nav-item active">
                    <span class="nav-icon">⊞</span> Tag Manager
                </span>
                <a href="/details" class="nav-item" id="details-btn">
                    <span class="nav-icon">◧</span> Access Log
                </a>
                <a href="/users" class="nav-item">
                    <span class="nav-icon">◉</span> Users
                </a>
            </nav>
            <div class="topbar-status">
                <span class="status-dot"></span>
                <span class="status-text">LIVE</span>
            </div>
        </header>

        <!-- ── MAIN ── -->
        <div class="main">

            <!-- ── LEFT: REGISTER PANEL ── -->
            <aside class="register-panel">

                <div class="panel-heading">
                    <div class="panel-title">REGISTER CARD</div>
                    <div class="panel-sub">Scan or enter card details</div>
                </div>

                <!-- scan zone -->
                <div class="scan-zone" id="scan-zone">
                    <div class="scan-ring outer"></div>
                    <div class="scan-ring inner"></div>
                    <div class="scan-icon">◉</div>
                    <div class="scan-label">RFID READY</div>
                </div>

                <!-- form fields -->
                <div class="form-group">
                    <label class="form-label" for="card-uid">CARD UID</label>
                    <input type="text" id="card-uid" class="form-input" placeholder="e.g. A3:F2:01:CC" autocomplete="off" spellcheck="false">
                </div>

                <div class="form-group">
                    <label class="form-label" for="card-description">DESCRIPTION</label>
                    <input type="text" id="card-description" class="form-input" placeholder="e.g. Main entrance card" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="card-user">USER EMAIL <span class="form-label-optional">(optional)</span></label>
                    <input type="email" id="card-user" class="form-input" placeholder="e.g. john@example.com" autocomplete="off">
                </div>

                <button id="add-btn" class="add-btn">
                    <span class="add-btn-icon">＋</span>
                    REGISTER CARD
                </button>

                <!-- feedback message -->
                <div id="message" class="message"></div>

            </aside>

            <!-- ── RIGHT: CARD REGISTRY ── -->
            <main class="registry-panel">

                <div class="registry-header">
                    <div>
                        <div class="panel-title">CARD REGISTRY</div>
                        <div class="panel-sub" id="card-count">Loading…</div>
                    </div>
                    <div class="registry-search-wrap">
                        <input type="text" id="registry-search" class="registry-search" placeholder="Search UID or user…" autocomplete="off">
                        <span class="search-icon">⌕</span>
                    </div>
                    <div class="registry-legend">
                        <span class="legend-item legend-active">ACTIVE</span>
                        <span class="legend-item legend-inactive">INACTIVE</span>
                    </div>
                </div>

                <!-- column headers -->
                <div class="registry-columns">
                    <span>UID</span>
                    <span>USER</span>
                    <span>EMAIL</span>
                    <span>STATUS</span>
                    <span>ACTIONS</span>
                </div>

                <ul id="card-list" class="card-list"></ul>

                <div id="empty-state" class="empty-state" style="display:none">
                    <span class="empty-icon">◌</span>
                    <span>No cards registered yet.</span>
                </div>

            </main>

        </div>

    </div>

    <script type="module" src="static/script.js"></script>
</body>
</html>
