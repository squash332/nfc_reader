<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <link rel="stylesheet" href="static/details.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>

    <div class="layout">

        <div id="details-container" class="panel">
            <h1>Entry details</h1>
            <div class="controls">
                <button id="day-btn">Last 24 hours</button>
                <button id="week-btn">Last 7 days</button>
                <button id="month-btn">Last 30 days</button>
                <label for="event-type-select" id="filter-label">Filter events:</label>
                <select name="event-type-select" id="event-type-select">
                    <option id="both-option" value="">Both</option>
                    <option id="entry-option" value="in">Entry</option>
                    <option id="exit-option" value="out">Exit</option>
                </select>

                <div class="date-filter">
                    <h2>Custom date range:</h2>
                    <input type="datetime-local" class="date-control-from" placeholder="Select start date">
                    <input type="datetime-local" class="date-control-to" placeholder="Select end date">
                    <button id="get-data-btn">Get Data</button>
                </div>

            </div>
            <div class="card-info">
                <h2>Search cards via user</h2>
                <input type="text" id="search-user-input" placeholder="Enter user name">
            </div>
            <div class="user-info">
                <div id="user-cards-container">
                </div>
            </div>

        </div>

        <!-- results -->
        <div id="content">

        </div>
    </div>

    </div>

    <script type="module" src="static/details.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../static/utils.js"></script>
</body>

</html>
