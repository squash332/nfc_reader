<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <title>Access Log — Entry Details</title>
    <link rel="stylesheet" href="static/fonts.css">
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="static/flatpickr.min.css">
    <link rel="stylesheet" href="static/details.css">
</head>

<body>

    <!-- scanline overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- ── TOP NAV ── -->
    <header class="topbar">
        <div class="topbar-brand">
            <span class="logo-icon">◈</span>
            <div>
                <div class="logo-title">SENTINEL</div>
                <div class="logo-sub">Access Control System</div>
            </div>
        </div>
        <nav class="topbar-nav">
            <a href="/" class="nav-item nav-admin">
                <span class="nav-icon">⊞</span> Tag Manager
            </a>
            <span class="nav-item active nav-admin">
                <span class="nav-icon">◧</span> Access Log
            </span>
            <a href="/users" class="nav-item nav-admin">
                <span class="nav-icon">◉</span> Users
            </a>
            <a href="/register" class="nav-item nav-admin">
                <span class="nav-icon">⊕</span> Accounts
            </a>
        </nav>
        <div class="topbar-user">
            <span class="topbar-email" id="topbar-email"></span>
            <button class="topbar-logout-btn" id="topbar-logout">LOGOUT</button>
        </div>
    </header>

    <div class="layout">

        <!-- ── SIDEBAR ── -->
        <aside class="sidebar">

            <nav class="sidebar-section">
                <div class="section-label">TIME RANGE</div>
                <div class="range-buttons">
                    <button class="range-btn" id="day-btn" data-range="day">
                        <span class="btn-icon">◷</span>Last 24 hours
                    </button>
                    <button class="range-btn" id="week-btn" data-range="week">
                        <span class="btn-icon">◷</span>Last 7 days
                    </button>
                    <button class="range-btn active" id="month-btn" data-range="month">
                        <span class="btn-icon">◷</span>Last 30 days
                    </button>
                </div>
            </nav>

            <div class="sidebar-section">
                <div class="section-label">EVENT FILTER</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-type="">ALL</button>
                    <button class="filter-tab entry" data-type="in">ENTRY</button>
                    <button class="filter-tab exit" data-type="out">EXIT</button>
                    <button class="filter-tab rejected" data-type="rejected">REJECTED</button>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">CUSTOM RANGE</div>
                <div class="date-inputs">
                    <div class="date-field">
                        <label class="date-label">FROM</label>
                        <input type="text" class="date-control date-control-from" placeholder="Select date & time"
                            readonly>
                    </div>
                    <div class="date-field">
                        <label class="date-label">TO</label>
                        <input type="text" class="date-control date-control-to" placeholder="Select date & time"
                            readonly>
                    </div>
                    <button id="get-data-btn" class="primary-btn">
                        <span>▶</span> QUERY LOGS
                    </button>
                    <button id="clear-date-btn" class="clear-btn">
                        ✕ CLEAR
                    </button>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-label">FILTER BY USER</div>
                <div class="search-wrap">
                    <input type="text" id="filter-user-input" class="search-input" placeholder="Filter logs by name…"
                        autocomplete="off">
                    <span class="search-icon">⌕</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">CARD LOOKUP</div>
                <div class="search-wrap">
                    <input type="text" id="search-user-input" class="search-input" placeholder="Search by user name…"
                        autocomplete="off">
                    <span class="search-icon">⌕</span>
                </div>
                <div id="user-cards-container"></div>
            </div>

        </aside>

        <!-- ── MAIN LOG PANEL ── -->
        <main class="main-panel">

            <header class="log-header">
                <div class="log-title-group">
                    <h1 class="log-title">ACCESS LOG</h1>
                    <div class="log-subtitle" id="log-range-label">Last 30 days</div>
                </div>
                <div class="log-meta">
                    <div class="meta-item">
                        <span class="meta-label">ENTRIES</span>
                        <span class="meta-value" id="count-in">—</span>
                    </div>
                    <div class="meta-divider"></div>
                    <div class="meta-item">
                        <span class="meta-label">EXITS</span>
                        <span class="meta-value" id="count-out">—</span>
                    </div>
                    <div class="meta-divider"></div>
                    <div class="meta-item">
                        <span class="meta-label">TOTAL</span>
                        <span class="meta-value" id="count-total">—</span>
                    </div>
                </div>
            </header>

            <!-- column headers -->
            <div class="log-columns">
                <span>TIMESTAMP</span>
                <span>USER</span>
                <span>EMAIL</span>
                <span>CARD</span>
                <span>EVENT</span>
            </div>

            <!-- log rows injected here -->
            <div id="content" class="log-body">
                <div class="loading-state">
                    <span class="loading-spinner">◌</span>
                    <span>Loading records…</span>
                </div>
            </div>

        </main>

    </div>

    <script src="static/flatpickr.min.js"></script>
    <script type="module" src="static/details.js"></script>
</body>

</html>
