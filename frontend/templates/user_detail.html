<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>SENTINEL — User</title>
    <link rel="stylesheet" href="/static/fonts.css">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/user_detail.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <div class="app">

        <!-- ── TOP NAV ── -->
        <header class="topbar">
            <div class="topbar-brand">
                <span class="logo-icon">◈</span>
                <div>
                    <div class="logo-title">SENTINEL</div>
                    <div class="logo-sub">Access Control System</div>
                </div>
            </div>
            <nav class="topbar-nav">
                <a href="/" class="nav-item nav-admin"><span class="nav-icon">⊞</span> Tag Manager</a>
                <a href="/details" class="nav-item nav-admin"><span class="nav-icon">◧</span> Access Log</a>
                <a href="/users" class="nav-item nav-admin"><span class="nav-icon">◉</span> Users</a>
                <a href="/register" class="nav-item nav-admin"><span class="nav-icon">⊕</span> Accounts</a>
            </nav>
            <div class="topbar-user">
                <span class="topbar-email" id="topbar-email"></span>
                <button class="topbar-logout-btn" id="topbar-logout">LOGOUT</button>
            </div>
            <div class="topbar-status">
                <span class="status-dot"></span>
                <span class="status-text">LIVE</span>
            </div>
        </header>

        <!-- ── BODY ── -->
        <div class="ud-layout">

            <!-- ── SIDEBAR ── -->
            <aside class="ud-sidebar">

                <a href="/users" class="ud-back">← USERS</a>

                <!-- Profile -->
                <div class="ud-section">
                    <div class="ud-section-title">PROFILE</div>
                    <div class="ud-avatar" id="ud-avatar">—</div>
                    <a class="ud-name" id="ud-name">—</a>
                    <div class="ud-field" id="ud-position"></div>
                    <div class="ud-field ud-email-field" id="ud-email"></div>
                    <div class="ud-field ud-since" id="ud-since"></div>
                </div>

                <!-- This month stats -->
                <div class="ud-section">
                    <div class="ud-section-title">THIS MONTH</div>
                    <div class="ud-stat">
                        <span class="ud-stat-label">DAYS PRESENT</span>
                        <span class="ud-stat-value" id="stat-days">—</span>
                    </div>
                    <div class="ud-stat">
                        <span class="ud-stat-label">AVG TIME / DAY</span>
                        <span class="ud-stat-value" id="stat-avg">—</span>
                    </div>
                    <div class="ud-stat">
                        <span class="ud-stat-label">TOTAL HOURS</span>
                        <span class="ud-stat-value" id="stat-total">—</span>
                    </div>
                    <div class="ud-stat ud-stat-last">
                        <span class="ud-stat-label">LAST ENTRY</span>
                        <span class="ud-stat-value" id="stat-last">—</span>
                    </div>
                </div>

                <!-- Assigned cards -->
                <div class="ud-section ud-section-cards">
                    <div class="ud-section-title">
                        CARDS <span class="ud-card-count" id="ud-card-count"></span>
                    </div>
                    <div class="ud-cards-list" id="ud-cards-list"></div>
                </div>

            </aside>

            <!-- ── MAIN (calendar) ── -->
            <div class="ud-main">

                <!-- ── CALENDAR CONTROLS ── -->
                <div class="cal-controls">
                    <div class="cal-nav">
                        <button class="cal-nav-btn" id="prev-btn">←</button>
                        <span class="cal-month-label" id="cal-label">—</span>
                        <button class="cal-nav-btn" id="next-btn">→</button>
                    </div>
                    <div class="cal-view-toggle">
                        <button class="view-toggle-btn active" id="view-month">MONTH</button>
                        <button class="view-toggle-btn" id="view-week">WEEK</button>
                    </div>
                    <div class="cal-summary" id="cal-summary"></div>
                </div>

                <!-- ── CALENDAR ── -->
                <div class="calendar">
                    <div class="cal-header">
                        <span>MON</span>
                        <span>TUE</span>
                        <span>WED</span>
                        <span>THU</span>
                        <span>FRI</span>
                        <span>SAT</span>
                        <span>SUN</span>
                    </div>
                    <div class="cal-grid" id="cal-grid"></div>
                </div>

            </div>

        </div>
    </div>

    <script type="module" src="/static/user_detail.js"></script>
</body>
</html>
