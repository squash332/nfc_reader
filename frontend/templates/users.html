<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <title>SENTINEL — Users</title>
    <link rel="stylesheet" href="static/fonts.css">
    <link rel="stylesheet" href="static/styles.css">
    <link rel="stylesheet" href="static/users.css">
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <div class="app">

        <!-- ── TOP NAV ── -->
        <header class="topbar">
            <div class="topbar-brand">
                <span class="logo-icon">◈</span>
                <div>
                    <div class="logo-title">SENTINEL</div>
                    <div class="logo-sub">Access Control System</div>
                </div>
            </div>
            <nav class="topbar-nav">
                <a href="/" class="nav-item nav-admin">
                    <span class="nav-icon">⊞</span> Tag Manager
                </a>
                <a href="/details" class="nav-item nav-admin">
                    <span class="nav-icon">◧</span> Access Log
                </a>
                <span class="nav-item active nav-admin">
                    <span class="nav-icon">◉</span> Users
                </span>
                <a href="/register" class="nav-item nav-admin">
                    <span class="nav-icon">⊕</span> Accounts
                </a>
            </nav>
            <div class="topbar-user">
                <span class="topbar-email" id="topbar-email"></span>
                <button class="topbar-logout-btn" id="topbar-logout">LOGOUT</button>
            </div>
            <div class="topbar-status">
                <span class="status-dot"></span>
                <span class="status-text">LIVE</span>
            </div>
        </header>

        <!-- ── MAIN ── -->
        <div class="main">

            <!-- ── LEFT: ADD USER PANEL ── -->
            <aside class="register-panel">

                <div class="panel-heading">
                    <div class="panel-title">ADD USER</div>
                    <div class="panel-sub">Create a new system user</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="user-name">FULL NAME</label>
                    <input type="text" id="user-name" class="form-input" placeholder="e.g. John Doe" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="user-email">EMAIL</label>
                    <input type="email" id="user-email" class="form-input" placeholder="e.g. john@example.com" autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="user-position">POSITION <span class="form-label-optional">(optional)</span></label>
                    <input type="text" id="user-position" class="form-input" placeholder="e.g. Engineer" autocomplete="off">
                </div>

                <button id="add-btn" class="add-btn">
                    <span class="add-btn-icon">＋</span>
                    ADD USER
                </button>

                <div id="message" class="message"></div>

            </aside>

            <!-- ── RIGHT: USER REGISTRY ── -->
            <main class="registry-panel">

                <div class="registry-header">
                    <div>
                        <div class="panel-title">USER REGISTRY</div>
                        <div class="panel-sub" id="user-count">Loading…</div>
                    </div>
                    <div class="registry-search-wrap">
                        <input type="text" id="registry-search" class="registry-search" placeholder="Search name or position…" autocomplete="off">
                        <span class="search-icon">⌕</span>
                    </div>
                </div>

                <div class="registry-columns users-columns">
                    <span>NAME</span>
                    <span>EMAIL</span>
                    <span>POSITION</span>
                    <span>CARDS</span>
                    <span>ACTIONS</span>
                </div>

                <ul id="user-list" class="card-list"></ul>

                <div id="empty-state" class="empty-state" style="display:none">
                    <span class="empty-icon">◌</span>
                    <span>No users registered yet.</span>
                </div>

            </main>

        </div>

    </div>

    <script type="module" src="static/users.js"></script>
</body>
</html>
